name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Sync with Capacitor
      run: npx cap sync android

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle directly
      uses: gradle/actions/wrapper-validation@v4
      continue-on-error: true

    - name: Remove broken wrapper jar
      run: rm -f android/gradle/wrapper/gradle-wrapper.jar

    - name: Download Gradle 8.7 manually
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        export PATH=$PATH:$PWD/gradle-8.7/bin
        cd android
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Capacitor-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
