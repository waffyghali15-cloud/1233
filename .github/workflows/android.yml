name: Scan and Build Project

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Build Project
      run: |
        npm install
        npm run build
        npx cap sync android
        cd android
        ./gradlew assembleDebug

    - name: FAILED_SEARCH_SCAN
      run: |
        echo "--- جاري فحص مكان ملفات APK ---"
        find android/app/build/outputs/ -name "*.apk"
        echo "--- هيكلة المجلدات ---"
        ls -R android/app/build/outputs/
